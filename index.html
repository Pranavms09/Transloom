<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TransLoom - Login</title>

    <!-- Tailwind CSS via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              background: "#09090b",
              foreground: "#fafafa",
              card: "#09090b",
              primary: "#fafafa",
              border: "#27272a",
            },
          },
        },
      };
    </script>

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
  </head>
  <body
    class="bg-background text-foreground h-screen flex items-center justify-center font-sans"
  >
    <div
      class="w-full max-w-md bg-card border border-border p-8 rounded-2xl shadow-lg"
    >
      <div class="text-center mb-8">
        <div
          class="w-12 h-12 rounded-xl mx-auto mb-4 flex items-center justify-center"
          style="background: linear-gradient(to bottom right, #5555ff, #10b981)"
        >
          <i data-lucide="languages" class="text-white"></i>
        </div>
        <h1 class="text-2xl font-bold tracking-tight">Welcome to TransLoom</h1>
        <p class="text-gray-400 text-sm mt-2">
          Sign in to your PS2 MVP Account
        </p>
      </div>

      <!-- Login Form -->
      <form id="login-form" class="space-y-4">
        <div>
          <label for="email" class="block text-sm font-medium text-gray-300"
            >Email Address</label
          >
          <input
            type="email"
            id="email"
            required
            placeholder="you@example.com"
            class="mt-1 w-full bg-transparent border border-gray-700 rounded-lg px-4 py-2 text-white focus:outline-none focus:ring-2 focus:ring-blue-500"
          />
        </div>

        <div>
          <label for="password" class="block text-sm font-medium text-gray-300"
            >Password</label
          >
          <input
            type="password"
            id="password"
            required
            placeholder="••••••••"
            class="mt-1 w-full bg-transparent border border-gray-700 rounded-lg px-4 py-2 text-white focus:outline-none focus:ring-2 focus:ring-blue-500"
          />
        </div>

        <button
          type="submit"
          class="w-full bg-white text-black font-semibold rounded-lg px-4 py-2 hover:bg-gray-200 transition"
        >
          Sign In
        </button>
      </form>

      <div class="my-6 flex items-center">
        <div class="flex-grow border-t border-gray-700"></div>
        <span class="px-3 text-xs text-gray-500 uppercase"
          >Or continue with</span
        >
        <div class="flex-grow border-t border-gray-700"></div>
      </div>

      <button
        id="google-login-btn"
        class="w-full flex items-center justify-center gap-2 bg-[#1a1a1c] border border-gray-700 text-white font-medium rounded-lg px-4 py-2 hover:bg-gray-800 transition"
      >
        <i data-lucide="chrome" class="w-4 h-4"></i>
        Google
      </button>

      <p class="text-center text-sm text-gray-400 mt-6">
        Don't have an account?
        <a
          href="register.html"
          class="text-blue-500 hover:text-blue-400 font-medium"
          >Register here</a
        >
      </p>
    </div>

    <script>
      lucide.createIcons();
    </script>

    <!-- Load Authentication Module -->
    <script type="module">
      import { initializeAuthProtection } from "./auth.js";
      // Initialize protection immediately on load
      initializeAuthProtection();
    </script>
  </body>
</html>
